<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auction Deal Evaluator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: 40px auto;
    line-height: 1.6;
  }
  input, button {
    padding: 10px;
    font-size: 16px;
    width: 100%;
    margin-top: 10px;
  }
  #result {
    margin-top: 20px;
    padding: 20px;
    border-radius: 6px;
  }
  .good { background: #d7ffd7; border: 2px solid #3a9e3a;}
  .bad  { background: #ffd7d7; border: 2px solid #c03a3a;}
</style>
</head>
<body>

<h1>Auction Deal Evaluator</h1>
<p>Indsæt et Auctionet lot-link:</p>

<input id="lotUrl" type="text" placeholder="https://auctionet.com/...">
<button onclick="analyze()">Beregn</button>

<div id="result"></div>

<script>
const proxy = "https://corsproxy.io/?";

// Hent HTML via proxy
async function fetchHtml(url) {
    const res = await fetch(proxy + encodeURIComponent(url));
    const data = await res.json();
    return data.contents;
}

// Hent Vitus guld/sølv-priser
async function fetchVitusPrices() {
    const html = await fetchHtml("https://www.vitusguld.dk/kob-salg");

    const silverMatch = html.match(/Sølv[^<]*999[^0-9]*([\d.,]+)/i);
    const goldMatch = html.match(/Guld[^<]*999[^0-9]*([\d.,]+)/i);

    const format = n => parseFloat(n.replace(/\./g, "").replace(",", "."));

    return {
        silver999: silverMatch ? format(silverMatch[1]) : 0,
        gold999: goldMatch ? format(goldMatch[1]) : 0
    };
}

function num(x) {
    return parseFloat(x.replace(/\./g, "").replace(",", "."));
}

async function analyze() {
    const url = document.getElementById("lotUrl").value.trim();
    const result = document.getElementById("result");

    if (!url) {
        result.innerHTML = "Indsæt et link først.";
        return;
    }

    result.innerHTML = "Henter data...";

    try {
        const html = await fetchHtml(url);

        // Titel
        const title = (html.match(/<h1[^>]*>(.*?)<\/h1>/) || [,"Ukendt titel"])[1];

        // Materiale
        const material = (html.match(/Material[^<]*<\/dt>\s*<dd[^>]*>(.*?)<\/dd>/i) || ["","Unknown"])[1];

        // Vægt i gram
        const weightMatch = html.match(/Weight[^<]*<\/dt>\s*<dd[^>]*>([\d.,]+)\s*g/i);
        const weight = weightMatch ? num(weightMatch[1]) : 0;

        // Solgt for
        const soldMatch = html.match(/Sold for<\/span>\s*([\d.,]+)/i);
        const sold = soldMatch ? num(soldMatch[1]) : 0;

        // Hent Vitus dagspris
        const vitus = await fetchVitusPrices();

        let vitusValue = 0;

        if (material.toLowerCase().includes("sterling") || material.toLowerCase().includes("silver")) {
            vitusValue = vitus.silver999 * weight * 0.925;
        }
        if (material.toLowerCase().includes("gold")) {
            vitusValue = vitus.gold999 * weight * 0.999;
        }

        const profit = vitusValue - sold;
        const pct = sold > 0 ? (profit / sold) * 100 : 0;

        const cls = profit >= 0 ? "good" : "bad";

        result.className = cls;
        result.innerHTML = `
            <h2>${title}</h2>
            <p><b>Materiale:</b> ${material}</p>
            <p><b>Vægt:</b> ${weight} g</p>
            <p><b>Solgt for:</b> ${sold} DKK</p>
            <p><b>Vitus råværdi:</b> ${vitusValue.toFixed(2)} DKK</p>
            <hr>
            <h3>${profit >= 0 ? "✔ God handel" : "✘ Dårlig handel"}</h3>
            <p><b>Profit:</b> ${profit.toFixed(2)} DKK (${pct.toFixed(1)}%)</p>
        `;
    } catch (e) {
        result.innerHTML = "Fejl: " + e;
    }
}
</script>

</body>
</html>

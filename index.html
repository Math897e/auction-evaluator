<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auction Evaluator</title>
  <style>
    body { font-family: Arial; margin: 40px; background: #f8f8f8; }
    .box { background: white; padding: 20px; border-radius: 8px; max-width: 600px; margin: auto; }
    input { width: 100%; padding: 10px; font-size: 1rem; }
    button { padding: 10px 15px; margin-top: 10px; font-size: 1rem; cursor: pointer; }
    #result { margin-top: 20px; padding: 15px; background: #eee; border-radius: 6px; }
  </style>
</head>

<body>
  <div class="box">
    <h1>Auction Evaluator</h1>
    <p>Indsæt et link til en auktion:</p>

    <input id="lotUrl" placeholder="https://example.com/lot123" />
    <button onclick="analyze()">Analyser</button>

    <div id="result"></div>
  </div>

  <script>
    function analyze() {
      const url = document.getElementById("lotUrl").value.trim();
      const result = document.getElementById("result");

      if (!url) {
        result.innerHTML = "Indsæt et link først.";
        return;
      }

      // SIMPLE VERSION: ingen fetch, ingen scraping
      result.innerHTML = `
        <h3>Analyseret link:</h3>
        <p><a href="${url}" target="_blank">${url}</a></p>
        <p>(Her kan du senere tilføje scraping, modeller, osv.)</p>
      `;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auction Evaluator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 40px;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
    }
    input {
      width: 100%;
      padding: 10px;
      font-size: 1rem;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 15px;
      font-size: 1rem;
      cursor: pointer;
      background: #0077cc;
      color: white;
      border: none;
      border-radius: 5px;
    }
    #result {
      margin-top: 20px;
      background: #eee;
      padding: 15px;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Auction Evaluator</h1>
    <p>Indsæt et link til en auktion:</p>

    <input id="lotUrl" placeholder="https://example.com/lot123">
    <button onclick="analyze()">Analyser</button>

    <div id="result"></div>
  </div>

  <script>
    function analyze() {
      const url = document.getElementById("lotUrl").value.trim();
      const result = document.getElementById("result");

      if (!url) {
        result.innerHTML = "Indsæt et link først.";
        return;
      }

      // SIMPEL VERSION — ingen scraping, kun vis input
      result.innerHTML = `
        <h3>Analyseret link:</h3>
        <p>${url}${url}</a></p>
        <p>(Her kan du senere tilføje vægt, materiale, model osv.)</p>
      `;
    }
  </script>
</body>
</html>
